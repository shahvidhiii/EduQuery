<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduQuery — AI Teaching Assistant</title>
    <meta name="description" content="Ask questions about your video lectures and get streaming answers with clickable source timestamps.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0f1e;
            --bg-secondary: #111827;
            --bg-card: #1a2236;
            --bg-input: #0d1529;
            --surface-glass: rgba(26,34,54,0.85);
            --border-subtle: rgba(99,128,255,0.08);
            --border-active: rgba(99,128,255,0.25);
            --text-primary: #e8ecf4;
            --text-secondary: rgba(232,236,244,0.6);
            --text-muted: rgba(232,236,244,0.35);
            --accent-blue: #6380ff;
            --accent-cyan: #22d3ee;
            --accent-violet: #a78bfa;
            --accent-emerald: #34d399;
            --accent-gradient: linear-gradient(135deg, #6380ff 0%, #22d3ee 100%);
            --user-gradient: linear-gradient(135deg, #6380ff 0%, #818cf8 100%);
            --source-bg: rgba(99,128,255,0.06);
            --source-hover: rgba(99,128,255,0.14);
            --shadow-card: 0 8px 32px rgba(0,0,0,0.35);
            --shadow-glow: 0 0 40px rgba(99,128,255,0.08);
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --radius-pill: 999px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-primary);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(99,128,255,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(34,211,238,0.06) 0%, transparent 50%);
            color: var(--text-primary);
        }

        /* ── Chat Container ── */
        #chat-container {
            width: 100%;
            max-width: 820px;
            height: 88vh;
            background: var(--surface-glass);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card), var(--shadow-glow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-subtle);
        }

        /* ── Header ── */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 22px;
            border-bottom: 1px solid var(--border-subtle);
            background: rgba(17,24,39,0.6);
        }
        .brand { display: flex; align-items: center; gap: 14px; }
        .brand .logo {
            width: 44px; height: 44px;
            border-radius: var(--radius-md);
            background: var(--accent-gradient);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 0.9rem;
            box-shadow: 0 4px 16px rgba(99,128,255,0.3);
            position: relative;
        }
        .brand .logo::after {
            content: '';
            position: absolute; inset: -2px;
            border-radius: inherit;
            background: var(--accent-gradient);
            opacity: 0.2;
            z-index: -1;
            filter: blur(8px);
        }
        .brand h1 { font-size: 1rem; font-weight: 700; letter-spacing: -0.01em; }
        .brand p { font-size: 0.78rem; color: var(--text-secondary); margin-top: 1px; }

        .header-actions {
            margin-left: auto;
            display: flex; align-items: center; gap: 10px;
        }
        .header-badge {
            font-size: 0.7rem;
            color: var(--accent-cyan);
            background: rgba(34,211,238,0.08);
            padding: 4px 10px;
            border-radius: var(--radius-pill);
            border: 1px solid rgba(34,211,238,0.12);
            letter-spacing: 0.03em;
            text-transform: uppercase;
            font-weight: 600;
            display: flex; align-items: center; gap: 5px;
        }
        .header-badge .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent-emerald);
            display: inline-block;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        #clear-chat {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.78rem;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            font-family: inherit;
        }
        #clear-chat:hover {
            background: rgba(255,80,80,0.08);
            border-color: rgba(255,80,80,0.2);
            color: #ff6b6b;
        }

        /* ── Chat Window ── */
        #chat-window {
            flex-grow: 1;
            padding: 22px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }
        #chat-window::-webkit-scrollbar { width: 6px; }
        #chat-window::-webkit-scrollbar-track { background: transparent; }
        #chat-window::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }
        #chat-window::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

        /* ── Messages ── */
        .message-row {
            display: flex; gap: 10px; align-items: flex-start;
            animation: msgSlideIn 0.3s ease forwards;
            opacity: 0;
        }
        .message-row.from-user { flex-direction: row-reverse; }
        @keyframes msgSlideIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 34px; height: 34px;
            border-radius: var(--radius-sm);
            display: inline-flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.72rem;
            color: white; flex-shrink: 0;
            margin-top: 2px;
        }
        .avatar.bot {
            background: linear-gradient(135deg, var(--bg-card), rgba(99,128,255,0.15));
            color: var(--accent-blue);
            border: 1px solid var(--border-subtle);
        }
        .avatar.user {
            background: var(--user-gradient);
            box-shadow: 0 2px 10px rgba(99,128,255,0.25);
        }

        .message {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            max-width: 78%;
            line-height: 1.6;
            font-size: 0.92rem;
        }
        .user-message {
            background: var(--user-gradient);
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 16px rgba(99,128,255,0.2);
        }
        .bot-message {
            background: var(--bg-card);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-subtle);
        }

        /* ── Bot message markdown styling ── */
        .message p { margin: 0 0 8px 0; }
        .message p:last-child { margin-bottom: 0; }
        .message ul, .message ol { padding-left: 20px; margin: 6px 0; }
        .message li { margin-bottom: 4px; }
        .message code {
            background: rgba(99,128,255,0.1);
            padding: 2px 6px; border-radius: 4px;
            font-size: 0.86em; color: var(--accent-cyan);
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
        }
        .message pre {
            background: var(--bg-input);
            padding: 12px; border-radius: var(--radius-sm);
            overflow-x: auto; margin: 8px 0;
            border: 1px solid var(--border-subtle);
        }
        .message pre code { background: none; padding: 0; color: var(--text-primary); }
        .message table { border-collapse: collapse; width: 100%; margin: 8px 0; }
        .message td, .message th { border: 1px solid var(--border-subtle); padding: 6px 10px; font-size: 0.88em; }
        .message th { background: rgba(99,128,255,0.06); }
        .message strong { color: var(--accent-blue); font-weight: 600; }
        .message em { color: var(--accent-violet); }
        .message a { color: var(--accent-cyan); text-decoration: none; }
        .message a:hover { text-decoration: underline; }
        .message h1, .message h2, .message h3 {
            color: var(--accent-blue);
            margin: 12px 0 6px 0;
            font-size: 1em;
        }
        .message blockquote {
            border-left: 3px solid var(--accent-violet);
            padding-left: 12px;
            margin: 8px 0;
            color: var(--text-secondary);
        }

        .meta { display: block; margin-top: 6px; }
        .timestamp { font-size: 0.7rem; color: var(--text-muted); }

        /* ── Streaming Cursor ── */
        .streaming-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--accent-blue);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink-cursor 0.8s steps(1) infinite;
        }
        @keyframes blink-cursor {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* ── Sources: Clickable Pills ── */
        .sources-container {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border-subtle);
            animation: fadeInSources 0.4s ease forwards;
        }
        @keyframes fadeInSources {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .sources-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sources-label::before {
            content: '📎';
            font-size: 0.75rem;
        }
        .sources-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .source-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: var(--radius-pill);
            background: var(--source-bg);
            border: 1px solid var(--border-subtle);
            font-size: 0.76rem;
            color: var(--accent-blue);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            font-family: inherit;
            animation: pillPop 0.3s ease forwards;
            opacity: 0;
        }
        .source-pill:nth-child(1) { animation-delay: 0.05s; }
        .source-pill:nth-child(2) { animation-delay: 0.1s; }
        .source-pill:nth-child(3) { animation-delay: 0.15s; }
        .source-pill:nth-child(4) { animation-delay: 0.2s; }
        .source-pill:nth-child(5) { animation-delay: 0.25s; }
        @keyframes pillPop {
            from { opacity: 0; transform: scale(0.9) translateY(4px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .source-pill:hover {
            background: var(--source-hover);
            border-color: var(--border-active);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(99,128,255,0.2);
        }
        .source-pill:active {
            transform: translateY(0) scale(0.97);
        }
        .source-pill .pill-icon {
            width: 20px; height: 20px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.55rem; color: white; font-weight: 700;
            flex-shrink: 0;
        }
        .source-pill .pill-title {
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .source-pill .pill-time {
            color: var(--accent-cyan);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            font-size: 0.72rem;
        }
        .source-pill.has-video .pill-play {
            width: 14px; height: 14px;
            border-radius: 50%;
            background: rgba(34,211,238,0.15);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .source-pill.has-video .pill-play::after {
            content: '';
            display: block;
            width: 0; height: 0;
            border-left: 5px solid var(--accent-cyan);
            border-top: 3px solid transparent;
            border-bottom: 3px solid transparent;
            margin-left: 1px;
        }
        .source-pill.no-video {
            color: var(--text-secondary);
            border-style: dashed;
        }
        .source-pill.no-video .pill-icon {
            background: linear-gradient(135deg, rgba(99,128,255,0.3), rgba(99,128,255,0.1));
        }

        /* ── Tooltip ── */
        .source-tooltip {
            position: fixed;
            background: var(--bg-secondary);
            border: 1px solid var(--border-active);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            font-size: 0.76rem;
            color: var(--text-primary);
            z-index: 10000;
            pointer-events: none;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            animation: tooltipIn 0.15s ease;
            max-width: 260px;
        }
        @keyframes tooltipIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Input Form ── */
        #chat-form {
            display: flex; gap: 10px;
            padding: 14px 18px;
            border-top: 1px solid var(--border-subtle);
            background: rgba(17,24,39,0.5);
        }
        #message-input {
            flex-grow: 1;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-pill);
            padding: 12px 18px;
            font-size: 0.92rem;
            outline: none;
            background: var(--bg-input);
            color: var(--text-primary);
            font-family: inherit;
            transition: all 0.2s ease;
        }
        #message-input::placeholder { color: var(--text-muted); }
        #message-input:focus {
            border-color: var(--border-active);
            box-shadow: 0 0 0 3px rgba(99,128,255,0.08);
        }
        #send-button {
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-pill);
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.88rem;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 16px rgba(99,128,255,0.25);
            transition: all 0.2s ease;
            font-family: inherit;
            min-width: 80px;
            justify-content: center;
        }
        #send-button:hover:not(:disabled) {
            box-shadow: 0 6px 24px rgba(99,128,255,0.35);
            transform: translateY(-1px);
        }
        #send-button:disabled { opacity: 0.5; cursor: default; }

        /* ── Dot Loader (for button) ── */
        .dot-loader { display: inline-flex; gap: 3px; align-items: center; height: 16px; }
        .dot-loader span {
            width: 5px; height: 5px;
            background: white; border-radius: 50%;
            animation: dotPulse 1.2s infinite ease-in-out;
        }
        .dot-loader span:nth-child(1) { animation-delay: 0s; }
        .dot-loader span:nth-child(2) { animation-delay: 0.15s; }
        .dot-loader span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ── Thinking Indicator ── */
        .thinking-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0 4px 0;
            font-size: 0.78rem;
            color: var(--text-muted);
        }
        .thinking-dots {
            display: inline-flex; gap: 3px;
        }
        .thinking-dots span {
            width: 4px; height: 4px;
            background: var(--accent-blue);
            border-radius: 50%;
            animation: dotPulse 1.2s infinite ease-in-out;
        }
        .thinking-dots span:nth-child(1) { animation-delay: 0s; }
        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

        /* ── Video Modal ── */
        .video-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeIn 0.2s ease;
            padding: 20px;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .video-modal {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
            box-shadow: 0 24px 80px rgba(0,0,0,0.6);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
            animation: modalSlide 0.3s ease;
        }
        @keyframes modalSlide {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .video-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .video-modal-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .video-modal-subtitle {
            font-size: 0.76rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .video-modal-close {
            width: 32px; height: 32px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-subtle);
            background: rgba(255,255,255,0.04);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .video-modal-close:hover {
            background: rgba(255,80,80,0.1);
            border-color: rgba(255,80,80,0.2);
            color: #ff6b6b;
        }
        .video-modal-body {
            padding: 0;
            background: black;
        }
        .video-modal-body video {
            width: 100%;
            display: block;
            max-height: 70vh;
        }

        /* ── Shake Animation ── */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-3px); }
            40% { transform: translateX(3px); }
            60% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
        }

        /* ── Responsive ── */
        @media (max-width: 700px) {
            #chat-container { height: 100vh; border-radius: 0; }
            .message { max-width: 88%; }
            .brand h1 { font-size: 0.92rem; }
            .header-badge { display: none; }
            .source-pill .pill-title { max-width: 90px; }
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="chat-header">
            <div class="brand">
                <div class="logo">EQ</div>
                <div>
                    <h1>EduQuery</h1>
                    <p>Ask questions about your video lectures</p>
                </div>
            </div>
            <div class="header-actions">
                <span class="header-badge" id="backend-badge">
                    <span class="status-dot"></span>
                    <span id="badge-text">Connecting…</span>
                </span>
                <button id="clear-chat">Clear</button>
            </div>
        </div>

        <div id="chat-window">
            <div class="message-row">
                <div class="avatar bot">EQ</div>
                <div class="message bot-message">
                    <p><strong>Hello!</strong> Ask me anything about your video lectures.</p>
                    <span class="meta">I'll find the answer and link you directly to the video timestamp.</span>
                </div>
            </div>
        </div>

        <form id="chat-form">
            <input type="text" id="message-input" placeholder="Ask a question… (press Enter to send)" autocomplete="off">
            <button id="send-button" type="submit">
                <span class="send-label">Send</span>
                <span class="dot-loader" style="display:none"><span></span><span></span><span></span></span>
            </button>
        </form>
    </div>

    <!-- Video Player Modal -->
    <div id="video-modal-overlay" class="video-modal-overlay" style="display:none">
        <div class="video-modal">
            <div class="video-modal-header">
                <div>
                    <div class="video-modal-title" id="video-modal-title">Video Player</div>
                    <div class="video-modal-subtitle" id="video-modal-subtitle"></div>
                </div>
                <button class="video-modal-close" id="video-modal-close">✕</button>
            </div>
            <div class="video-modal-body">
                <video id="video-player" controls preload="metadata">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
    </div>

    <script>
        // ─── Configuration ───
        const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://127.0.0.1:8000'
            : '';
        const apiUrl = `${API_BASE}/ask`;

        // ─── DOM Refs ───
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const chatWindow = document.getElementById('chat-window');
        const sendButton = document.getElementById('send-button');
        const sendLabel = sendButton.querySelector('.send-label');
        const dots = sendButton.querySelector('.dot-loader');
        const clearBtn = document.getElementById('clear-chat');
        const badgeText = document.getElementById('badge-text');
        const backendBadge = document.getElementById('backend-badge');
        const videoOverlay = document.getElementById('video-modal-overlay');
        const videoPlayer = document.getElementById('video-player');
        const videoModalTitle = document.getElementById('video-modal-title');
        const videoModalSubtitle = document.getElementById('video-modal-subtitle');
        const videoModalClose = document.getElementById('video-modal-close');

        let isSending = false;
        const conversationHistory = [];

        // Configure marked for safe rendering
        marked.setOptions({
            breaks: true,
            gfm: true,
        });

        // ─── Detect Backend ───
        fetch(`${API_BASE}/`)
            .then(r => r.json())
            .then(data => {
                if (data.backend === 'chromadb') {
                    badgeText.textContent = '⚡ ChromaDB';
                    backendBadge.style.color = '#a78bfa';
                    backendBadge.style.background = 'rgba(167,139,250,0.08)';
                    backendBadge.style.borderColor = 'rgba(167,139,250,0.15)';
                } else if (data.backend === 'pickle') {
                    badgeText.textContent = 'Local';
                    backendBadge.style.color = 'var(--accent-cyan)';
                } else {
                    badgeText.textContent = 'Offline';
                    backendBadge.style.color = '#ff6b6b';
                }
            })
            .catch(() => {
                badgeText.textContent = 'Offline';
                backendBadge.querySelector('.status-dot').style.background = '#ff6b6b';
            });

        // ─── Clear Chat ───
        clearBtn.addEventListener('click', () => {
            if (confirm("Clear this conversation?")) {
                conversationHistory.length = 0;
                chatWindow.innerHTML = `
                    <div class="message-row">
                        <div class="avatar bot">EQ</div>
                        <div class="message bot-message">
                            <p><strong>Clean slate!</strong> What can I help you find in the videos?</p>
                        </div>
                    </div>
                `;
            }
        });

        // ─── Video Modal ───
        function openVideoModal(videoUrl, title, startTime) {
            const fullUrl = `${API_BASE}${videoUrl.split('#')[0]}`;
            videoPlayer.src = fullUrl;
            videoModalTitle.textContent = title || 'Video Player';
            videoModalSubtitle.textContent = `Starting at ${formatTimestamp(startTime)}`;
            videoOverlay.style.display = 'flex';

            videoPlayer.addEventListener('loadedmetadata', function seekOnLoad() {
                videoPlayer.currentTime = startTime;
                videoPlayer.play().catch(() => {});
                videoPlayer.removeEventListener('loadedmetadata', seekOnLoad);
            });
        }

        function closeVideoModal() {
            videoPlayer.pause();
            videoPlayer.removeAttribute('src');
            videoPlayer.load();
            videoOverlay.style.display = 'none';
        }

        videoModalClose.addEventListener('click', closeVideoModal);
        videoOverlay.addEventListener('click', (e) => {
            if (e.target === videoOverlay) closeVideoModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && videoOverlay.style.display !== 'none') closeVideoModal();
        });

        // ─── Format Helpers ───
        function formatTimestamp(seconds) {
            const s = Math.round(seconds);
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            if (h > 0) return `${h}h ${m.toString().padStart(2, '0')}m ${sec.toString().padStart(2, '0')}s`;
            if (m > 0) return `${m}m ${sec.toString().padStart(2, '0')}s`;
            return `${sec}s`;
        }

        function formatTime(date = new Date()) {
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // ─── Tooltip System ───
        let activeTooltip = null;

        function showTooltip(el, text) {
            hideTooltip();
            const tip = document.createElement('div');
            tip.className = 'source-tooltip';
            tip.textContent = text;
            document.body.appendChild(tip);

            const rect = el.getBoundingClientRect();
            tip.style.left = rect.left + 'px';
            tip.style.top = (rect.top - tip.offsetHeight - 8) + 'px';

            // Ensure tooltip doesn't go off-screen
            if (parseFloat(tip.style.top) < 8) {
                tip.style.top = (rect.bottom + 8) + 'px';
            }

            activeTooltip = tip;
        }

        function hideTooltip() {
            if (activeTooltip) {
                activeTooltip.remove();
                activeTooltip = null;
            }
        }

        // ─── Render Clickable Sources ───
        function renderSources(container, sources) {
            if (!container || !Array.isArray(sources) || sources.length === 0) return;

            container.innerHTML = '';
            const label = document.createElement('div');
            label.className = 'sources-label';
            label.textContent = `${sources.length} Source${sources.length > 1 ? 's' : ''} Found`;
            container.appendChild(label);

            const pillsDiv = document.createElement('div');
            pillsDiv.className = 'sources-pills';

            sources.forEach((source, idx) => {
                const pill = document.createElement('button');
                const hasVideo = !!source.video_url;
                pill.className = 'source-pill' + (hasVideo ? ' has-video' : ' no-video');
                pill.type = 'button';

                // Icon with video number
                const icon = document.createElement('span');
                icon.className = 'pill-icon';
                icon.textContent = source.video_number || '?';

                // Title
                const titleSpan = document.createElement('span');
                titleSpan.className = 'pill-title';
                titleSpan.textContent = source.title || 'Untitled';

                // Timestamp
                const timeSpan = document.createElement('span');
                timeSpan.className = 'pill-time';
                timeSpan.textContent = formatTimestamp(source.start_time || 0);

                pill.appendChild(icon);
                pill.appendChild(titleSpan);
                pill.appendChild(timeSpan);

                // Play indicator for videos
                if (hasVideo) {
                    const play = document.createElement('span');
                    play.className = 'pill-play';
                    pill.appendChild(play);
                }

                // Hover tooltip
                pill.addEventListener('mouseenter', () => {
                    const tipText = hasVideo
                        ? `▶ Click to play Video ${source.video_number} at ${formatTimestamp(source.start_time || 0)}`
                        : `Video ${source.video_number}: ${source.title} — ${formatTimestamp(source.start_time || 0)}`;
                    showTooltip(pill, tipText);
                });
                pill.addEventListener('mouseleave', hideTooltip);

                // Click handler
                pill.addEventListener('click', () => {
                    hideTooltip();
                    if (hasVideo) {
                        openVideoModal(
                            source.video_url,
                            `Video ${source.video_number}: ${source.title}`,
                            source.start_time || 0
                        );
                    } else {
                        // Shake to indicate no video file
                        pill.style.animation = 'none';
                        pill.offsetHeight;
                        pill.style.animation = 'shake 0.4s ease';
                        showTooltip(pill, '📁 Video file not found — place videos in the videos/ folder');
                        setTimeout(hideTooltip, 2500);
                    }
                });

                pillsDiv.appendChild(pill);
            });

            container.appendChild(pillsDiv);
        }

        // ─── Send Message (Streaming) ───
        chatForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            if (isSending) return;

            const question = messageInput.value.trim();
            if (!question) return;

            // Add user message
            addMessageRow(question, 'user');
            conversationHistory.push({ role: 'user', content: question });
            messageInput.value = '';

            try {
                setSending(true);

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question, history: conversationHistory })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    addMessageRow(`⚠️ ${errorData.detail || 'Server error occurred'}`, 'bot');
                    return;
                }

                // Create bot message row with streaming placeholder
                const botRow = addMessageRow('', 'bot', [], true);
                const contentArea = botRow.querySelector('.bot-content');
                const sourcesDiv = botRow.querySelector('.sources-container');
                const thinkingEl = botRow.querySelector('.thinking-indicator');

                // Read the NDJSON stream
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullAnswer = '';
                let lineBuffer = '';
                let firstToken = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    lineBuffer += decoder.decode(value, { stream: true });
                    const parts = lineBuffer.split('\n');
                    lineBuffer = parts.pop() || '';

                    for (const line of parts) {
                        if (!line.trim()) continue;
                        try {
                            const data = JSON.parse(line);

                            switch (data.type) {
                                case 'sources':
                                    // Render source pills immediately
                                    renderSources(sourcesDiv, data.sources);
                                    break;

                                case 'token':
                                    // Remove thinking indicator on first token
                                    if (firstToken) {
                                        if (thinkingEl) thinkingEl.remove();
                                        firstToken = false;
                                    }
                                    fullAnswer += data.token;
                                    // Render markdown with streaming cursor
                                    contentArea.innerHTML = marked.parse(fullAnswer) + '<span class="streaming-cursor"></span>';
                                    break;

                                case 'done':
                                    // Final render without cursor
                                    contentArea.innerHTML = marked.parse(fullAnswer);
                                    break;

                                case 'error':
                                    contentArea.innerHTML = `<p>⚠️ ${data.message}</p>`;
                                    break;
                            }

                            // Legacy support for older protocol
                            if (data.sources && data.type !== 'sources') {
                                renderSources(sourcesDiv, data.sources);
                            }
                            if (data.answer_chunk) {
                                if (firstToken) {
                                    if (thinkingEl) thinkingEl.remove();
                                    firstToken = false;
                                }
                                fullAnswer += data.answer_chunk;
                                contentArea.innerHTML = marked.parse(fullAnswer) + '<span class="streaming-cursor"></span>';
                            }
                            if (data.answer) {
                                fullAnswer = data.answer;
                                contentArea.innerHTML = marked.parse(fullAnswer);
                            }

                        } catch (parseErr) {
                            // Ignore partial JSON
                        }
                    }
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }

                // Flush remaining buffer
                if (lineBuffer.trim()) {
                    try {
                        const data = JSON.parse(lineBuffer);
                        if (data.type === 'token') {
                            fullAnswer += data.token;
                        }
                        if (data.type === 'sources') {
                            renderSources(sourcesDiv, data.sources);
                        }
                    } catch(e) {}
                }

                // Final render (ensure cursor is removed)
                contentArea.innerHTML = marked.parse(fullAnswer);
                if (thinkingEl && thinkingEl.parentNode) thinkingEl.remove();

                conversationHistory.push({ role: 'assistant', content: fullAnswer });

            } catch (err) {
                console.error(err);
                addMessageRow('❌ Connection failed. Is the server running at ' + API_BASE + '?', 'bot');
            } finally {
                setSending(false);
            }
        });

        // ─── UI Helpers ───
        function setSending(state) {
            isSending = state;
            sendButton.disabled = state;
            sendLabel.style.display = state ? 'none' : 'inline';
            dots.style.display = state ? 'inline-flex' : 'none';
            if (state) {
                messageInput.setAttribute('disabled', '');
                messageInput.placeholder = 'Waiting for response…';
            } else {
                messageInput.removeAttribute('disabled');
                messageInput.placeholder = 'Ask a question… (press Enter to send)';
                messageInput.focus();
            }
        }

        function addMessageRow(text, who = 'bot', sources = [], isStreaming = false) {
            const row = document.createElement('div');
            row.className = 'message-row' + (who === 'user' ? ' from-user' : '');

            const avatar = document.createElement('div');
            avatar.className = 'avatar ' + (who === 'user' ? 'user' : 'bot');
            avatar.textContent = who === 'user' ? 'You' : 'EQ';

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + (who === 'user' ? 'user-message' : 'bot-message');

            if (who === 'user') {
                const p = document.createElement('p');
                p.textContent = text;
                messageDiv.appendChild(p);
            } else {
                // Bot content area for streaming
                const contentArea = document.createElement('div');
                contentArea.className = 'bot-content';
                if (text) {
                    contentArea.innerHTML = marked.parse(text);
                }
                messageDiv.appendChild(contentArea);

                // Thinking indicator (shown while waiting for first token)
                if (isStreaming) {
                    const thinking = document.createElement('div');
                    thinking.className = 'thinking-indicator';
                    thinking.innerHTML = `
                        <div class="thinking-dots"><span></span><span></span><span></span></div>
                        <span>Searching lectures…</span>
                    `;
                    messageDiv.appendChild(thinking);
                }

                // Sources container
                const sourcesDiv = document.createElement('div');
                sourcesDiv.className = 'sources-container';
                if (sources && sources.length > 0) renderSources(sourcesDiv, sources);
                messageDiv.appendChild(sourcesDiv);
            }

            // Timestamp
            const meta = document.createElement('div');
            meta.className = 'meta';
            meta.innerHTML = `<span class="timestamp">${formatTime()}</span>`;
            messageDiv.appendChild(meta);

            row.appendChild(avatar);
            row.appendChild(messageDiv);
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return row;
        }

        // ─── Keyboard shortcut: Ctrl+L to clear ───
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
                e.preventDefault();
                clearBtn.click();
            }
        });
    </script>
</body>
</html>
